<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>F48 Watch</title>
<style>
  :root{
    --ink:#000;              /* pure black — AMOLED friendly */
    --card:#141f18;
    --line:#2a4033;
    --cream:#f3eddc;
    --dim:#93a293;
    --turmeric:#e8a63c;
    --leaf:#7fbf8e;
    --chili:#e06a4f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
  /* root font scales with the smaller screen edge:
     450px watch → 18px, 396px watch → ~16px */
  html{font-size:4vmin}
  html,body{height:100%;background:var(--ink);color:var(--cream);
    font-family:-apple-system,'Segoe UI',Roboto,'Noto Sans',sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden}

  /* every screen is a centered column inside the round display,
     with generous corner insets so nothing is clipped by the circle */
  .scr{position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:12% 14%;gap:.55rem}
  .scr.act{display:flex}

  .eyebrow{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--turmeric)}
  .big{font-size:1.25rem;font-weight:800;line-height:1.2}
  .mid{font-size:.95rem;font-weight:700;line-height:1.25}
  .dimtx{font-size:.7rem;color:var(--dim);line-height:1.35}
  .rx{color:var(--turmeric);font-weight:800;font-size:1rem}

  button{border:0;border-radius:999px;font-weight:800;font-family:inherit;
    color:#1c1608;background:var(--turmeric)}
  .btn{width:100%;padding:.85rem .5rem;font-size:.95rem}
  .btn.grn{background:var(--leaf);color:#10241a}
  .btn.ghost{background:var(--card);color:var(--cream);border:1px solid var(--line)}
  .btn:active{transform:scale(.96)}

  .rowbtns{display:flex;gap:.5rem;width:100%}
  .rowbtns .btn{flex:1}

  /* round side arrows */
  .chev{position:absolute;top:50%;transform:translateY(-50%);
    width:2.1rem;height:2.1rem;border-radius:50%;background:var(--card);
    color:var(--cream);font-size:1rem;border:1px solid var(--line);z-index:5}
  .chev.l{left:2%}.chev.r{right:2%}

  /* progress dots */
  .dots{display:flex;gap:.22rem;justify-content:center;flex-wrap:wrap;max-width:80%}
  .dots i{width:.3rem;height:.3rem;border-radius:50%;background:var(--line)}
  .dots i.on{background:var(--turmeric)}
  .dots i.cur{background:var(--leaf);transform:scale(1.4)}

  /* set pips */
  .sets{display:flex;gap:.35rem;justify-content:center;margin:.1rem 0}
  .sets i{width:.55rem;height:.55rem;border-radius:50%;border:1px solid var(--turmeric)}
  .sets i.on{background:var(--turmeric)}

  /* giant countdown */
  .clockbig{font-size:3.4rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .clockbig.warn{color:var(--chili)}
  #restScr .clockbig{color:var(--leaf)}
  #workScr .clockbig{color:var(--turmeric)}

  .cue{font-size:.68rem;color:var(--dim);line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .cue.open{-webkit-line-clamp:unset;max-height:38vh;overflow-y:auto}

  .chip{font-size:.6rem;color:var(--leaf);border:1px solid var(--line);
    border-radius:999px;padding:.15rem .6rem;background:var(--card)}
  .chip.deload{color:var(--turmeric);border-color:var(--turmeric)}
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<div class="scr act" id="homeScr">
  <div class="eyebrow">Foundation 48</div>
  <div class="big" id="homeDay">Monday</div>
  <div class="dimtx" id="homeTitle">Lower Body</div>
  <span class="chip" id="homeChip">…</span>
  <input type="date" id="startPick" style="position:absolute;opacity:0;width:1px;height:1px;pointer-events:none">
  <button class="btn grn" id="startBtn">Start ▶</button>
  <button class="btn ghost" id="resumeBtn" style="display:none">Resume</button>
  <div class="dimtx" id="homeProg"></div>
  <button class="chev l" id="dayPrev">‹</button>
  <button class="chev r" id="dayNext">›</button>
</div>

<!-- ============ EXERCISE ============ -->
<div class="scr" id="exScr">
  <div class="eyebrow" id="exCount">1 / 12</div>
  <div class="mid" id="exName">Exercise</div>
  <div class="rx" id="exRx">3×12</div>
  <div class="sets" id="exSets"></div>
  <div class="cue" id="exCue">cue</div>
  <div class="rowbtns">
    <button class="btn" id="exMain">✓ Set done</button>
  </div>
  <button class="btn ghost" id="exSkip">Skip ›</button>
  <button class="chev l" id="exPrev">‹</button>
  <button class="chev r" id="exNext">›</button>
</div>

<!-- ============ WORK TIMER ============ -->
<div class="scr" id="workScr">
  <div class="eyebrow" id="workName">Hold</div>
  <div class="clockbig" id="workClock">0:30</div>
  <div class="dimtx">work — tap to stop</div>
</div>

<!-- ============ REST ============ -->
<div class="scr" id="restScr">
  <div class="eyebrow">Rest</div>
  <div class="clockbig" id="restClock">0:45</div>
  <div class="dimtx" id="restNext">next: …</div>
  <button class="btn ghost" id="restSkip">Skip rest ›</button>
</div>

<!-- ============ DONE ============ -->
<div class="scr" id="doneScr">
  <div style="font-size:2.2rem">✅</div>
  <div class="big">Session done</div>
  <div class="dimtx" id="doneSum"></div>
  <button class="btn" id="doneHome">Home</button>
</div>

<script>
/* ---------- program data (mirrors phone v3.1, trimmed cues) ---------- */
const DAYS = [
 {id:'mon', label:'Monday', title:'Lower Body · hips, knees, ankles', ex:[
  {n:'March in place', rx:'60s', c:'Easy pace, arms swinging.'},
  {n:'Cat–Cow', rx:'8 reps', c:'Hands and knees, move with the breath.'},
  {n:'Arm + hip circles', rx:'10 each way', c:'Shoulders, hips, then ankles.'},
  {n:'Chair sit-to-stand', rx:'4×10–15', c:'3s down, knees over toes, heels planted. Hardest clean version: arms crossed → slow lowering → water can at chest.'},
  {n:'Glute bridge', rx:'4×12–15', c:'Squeeze 2–3s at the top, ribs down. Wk5+ single-leg assisted.'},
  {n:'Band Romanian deadlift', rx:'3×12–15', c:'Stand on band, flat-back hinge until hamstrings load, hips drive forward.'},
  {n:'Supported step-up', rx:'3×8–10/side', c:'Hand on rail, drive through the top heel, lower slow.'},
  {n:'Hip flexor stretch', rx:'2×30s/side', c:'Chair support, back leg long, tuck tailbone, shift forward.'},
  {n:'Knee-to-wall rocks', rx:'2×10/side', c:'Foot flat, knee toward wall over toes.'},
  {n:'Calf raises', rx:'3×15', c:'Fingertips on wall, 3s down. Wk5+ single-leg.'},
  {n:'Side-lying leg lift', rx:'3×12/side', c:'Top leg straight, lift slow to hip height.'},
  {n:'Slow breathing', rx:'3 min', c:'In 4, out 6–8. Recovery switch.'}
 ]},
 {id:'tue', label:'Tuesday', title:'Posture + Pull · back, lats, forearms', ex:[
  {n:'March in place', rx:'60s', c:'Easy pace.'},
  {n:'Cat–Cow', rx:'8 reps', c:'Move with the breath.'},
  {n:'Arm + hip circles', rx:'10 each way', c:'Shoulders, hips, ankles.'},
  {n:'Wall angels', rx:'3×8', c:'Back and head on the wall, slide arms keeping contact.'},
  {n:'Chin tucks', rx:'2×10', c:'Glide head straight back, hold 3s.'},
  {n:'Band bent-over row', rx:'4×10–15', c:'Flat back, elbows to ribs, squeeze blades 2s. Progress: firmer band → single-arm → 3s release.'},
  {n:'Band lat pulldown', rx:'4×10–15', c:'Half-kneeling, band anchored high, elbows down to ribs, squeeze armpits 2s.'},
  {n:'Band pull-apart', rx:'3×15–20', c:'Arms straight, squeeze between the blades.'},
  {n:'Farmer carry', rx:'3×45–60s', c:'Two heavy bags, walk tall. Should feel heavy by the last 15s.'},
  {n:'Towel wring', rx:'2×10 each way', c:'Twist a rolled towel hard both directions.'},
  {n:'Slow breathing', rx:'3 min', c:'In 4, out 6–8.'}
 ]},
 {id:'wed', label:'Wednesday', title:'Active Recovery', ex:[
  {n:'Easy walk', rx:'20–30 min', c:'Conversational pace, outdoors if possible.'},
  {n:'Cat–Cow + Child\u2019s pose', rx:'5 min', c:'Gentle spine movement, then sit back and breathe.'},
  {n:'Legs-up-the-wall', rx:'10 min', c:'Evening. Lower-back decompression.'}
 ]},
 {id:'thu', label:'Thursday', title:'Push + Core · chest, abs', ex:[
  {n:'March in place', rx:'60s', c:'Easy pace.'},
  {n:'Cat–Cow', rx:'8 reps', c:'Move with the breath.'},
  {n:'Arm + hip circles', rx:'10 each way', c:'Shoulders, hips, ankles.'},
  {n:'Push-up (your level)', rx:'4×8–15', c:'Straight line, elbows ~45°. Wall → counter → table → sofa → knees → full. Start at the hardest you own.'},
  {n:'Band chest press', rx:'4×10–15', c:'Band anchored behind at chest height, press and squeeze 1s.'},
  {n:'Dead bug', rx:'3×10/side', c:'Lower back pressed down, opposite arm+leg extend slow. Wk5+ 3s holds.'},
  {n:'Bird dog', rx:'3×10/side', c:'Opposite arm+leg reach, lower back still. Wk5+ 3s holds.'},
  {n:'Band Pallof press', rx:'3×10/side', c:'Band to the side at chest height, press out, refuse the twist.'},
  {n:'Knee side plank', rx:'3×20–40s/side', c:'Hips lifted in one line. Wk5+ full side plank.'},
  {n:'Forearm plank', rx:'3× max hold', c:'Glutes tight, stop 2s before form breaks.'},
  {n:'Slow breathing', rx:'3 min', c:'In 4, out 6–8.'}
 ]},
 {id:'fri', label:'Friday', title:'Full Body + Grip · circuit ×3–4', ex:[
  {n:'March in place', rx:'60s', c:'Easy pace.'},
  {n:'Cat–Cow', rx:'8 reps', c:'Move with the breath.'},
  {n:'Sit-to-stand', rx:'3×12', c:'Circuit — one set here each round. Smooth and quiet.'},
  {n:'Band row', rx:'3×12', c:'Flat back, squeeze 2s.'},
  {n:'Push-up (your level)', rx:'3×10', c:'Whichever level you\u2019ve earned.'},
  {n:'Band Romanian deadlift', rx:'3×12', c:'Flat back, hips do the work.'},
  {n:'Glute bridge march', rx:'3×8/side', c:'Hold the bridge, lift one foot then the other.'},
  {n:'Suitcase carry', rx:'3×40s/side', c:'One heavy bag, perfectly upright.'},
  {n:'Brisk walk', rx:'8–10 min', c:'Faster than Wednesday\u2019s pace.'},
  {n:'Slow breathing', rx:'3 min', c:'In 4, out 6–8.'}
 ]},
 {id:'sat', label:'Saturday', title:'Flexibility Flow', ex:[
  {n:'Cat–Cow', rx:'10 reps', c:'Spine warm-up first, always.'},
  {n:'90/90 hip stretch', rx:'2×45s/side', c:'Sit tall, cushion under hip if needed.'},
  {n:'Low lunge opener', rx:'2×40s/side', c:'Cushion under back knee, tailbone tucked, sink forward.'},
  {n:'Hamstring strap stretch', rx:'2×40s/side', c:'On your back, towel around foot, mild stretch.'},
  {n:'Thread the needle', rx:'2×30s/side', c:'From all fours, slide one arm under.'},
  {n:'Knee-to-wall rocks', rx:'2×10/side', c:'Second ankle dose of the week.'},
  {n:'Child\u2019s pose + breathing', rx:'3 min', c:'Finish here. Long exhales.'}
 ]},
 {id:'sun', label:'Sunday', title:'Full Rest', ex:[
  {n:'Optional easy walk', rx:'20 min', c:'Only if you feel like it.'},
  {n:'Weekly joint check', rx:'2 min', c:'Knees, lower back, shoulders, wrists /10. 3+ → easier versions next week.'},
  {n:'Every 2nd Sun: measure', rx:'5 min', c:'Enter the five metrics in the phone app.'}
 ]}
];

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
const K = k => { try{ return localStorage.getItem(k); }catch(_){ return null; } };
const KS = (k,v) => { try{ localStorage.setItem(k,v); }catch(_){} };
const buzz = p => { try{ navigator.vibrate && navigator.vibrate(p); }catch(_){} };
function beep(f,d){ try{
  const c = new (window.AudioContext||window.webkitAudioContext)();
  const o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(c.destination); o.frequency.value = f||880;
  g.gain.setValueAtTime(.3,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+(d||.5));
  o.start(); o.stop(c.currentTime+(d||.5));
}catch(_){}}
function fmt(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function todayISO(){ return new Date().toISOString().slice(0,10); }

/* sets count from rx e.g. "4×10–15" → 4 ; default 1 */
function setsOf(rx){ const m = rx.match(/^(\d+)×/); return m ? +m[1] : 1; }
/* work seconds if the rx is time-based; 0 = rep-based */
function workSecs(rx){
  let m;
  if(m = rx.match(/(\d+)(?:[–-](\d+))?\s*min/)) return (m[2]?+m[2]:+m[1])*60;
  if(m = rx.match(/(\d+)(?:[–-](\d+))?s/)) return m[2]?+m[2]:+m[1];
  if(/max hold/.test(rx)) return 60;
  return 0;
}

/* ---------- state ---------- */
let dayIdx = (new Date().getDay()+6)%7;   // Mon=0 … Sun=6
let exIdx = 0, setDone = 0;
let sess = null;                           // per-day progress
const REST = 45;

function loadSess(){
  try{ sess = JSON.parse(K('f48w-'+todayISO())) || {}; }catch(_){ sess = {}; }
}
function saveSess(){
  KS('f48w-'+todayISO(), JSON.stringify(sess||{}));
}

/* ---------- week chip (start date shared spirit, stored on watch) ---------- */
function weekChip(){
  const st = K('f48w-startdate') || K('f48v2-start');
  if(!st){ $('homeChip').textContent = 'Wk ? — tap to set start'; return; }
  const diff = Math.floor((new Date().setHours(0,0,0,0) - new Date(st+'T00:00:00'))/86400000);
  if(diff < 0){ $('homeChip').textContent = 'Starts in '+(-diff)+'d'; return; }
  const wk = Math.floor(diff/7)+1;
  if(wk > 16){ $('homeChip').textContent = 'Complete 🎉'; return; }
  let t = 'Week '+wk+' / 16';
  $('homeChip').classList.toggle('deload', wk===8||wk===12||wk===16);
  if(wk===8||wk===12) t += ' · DELOAD';
  if(wk===16) t += ' · LIGHT';
  $('homeChip').textContent = t;
}

/* ---------- screens ---------- */
function show(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.toggle('act', s.id===id));
}

function renderHome(){
  const d = DAYS[dayIdx];
  $('homeDay').textContent = d.label;
  $('homeTitle').textContent = d.title;
  loadSess();
  const p = sess[d.id];
  const doneCt = p ? p.done.length : 0;
  $('homeProg').textContent = doneCt ? doneCt+' / '+d.ex.length+' exercises done today' : '';
  $('resumeBtn').style.display = (doneCt>0 && doneCt<d.ex.length) ? '' : 'none';
  $('startBtn').textContent = doneCt>=d.ex.length ? 'Done today ✓ (redo)' : 'Start ▶';
  weekChip();
  show('homeScr');
}

function renderEx(){
  const d = DAYS[dayIdx], e = d.ex[exIdx];
  $('exCount').textContent = (exIdx+1)+' / '+d.ex.length;
  $('exName').textContent = e.n;
  $('exRx').textContent = e.rx;
  const cue = $('exCue'); cue.textContent = e.c; cue.classList.remove('open');
  const n = setsOf(e.rx);
  $('exSets').innerHTML = Array.from({length:n},(_,i)=>'<i class="'+(i<setDone?'on':'')+'"></i>').join('');
  const w = workSecs(e.rx);
  $('exMain').textContent = w ? '▶ '+(w>=120? Math.round(w/60)+' min' : w+'s') : '✓ Set done';
  $('exMain').className = 'btn' + (w?' grn':'');
  show('exScr');
}

let tInt = null, tLeft = 0;
function stopT(){ clearInterval(tInt); tInt = null; }

function runWork(secs){
  const d = DAYS[dayIdx], e = d.ex[exIdx];
  $('workName').textContent = e.n;
  tLeft = secs; $('workClock').textContent = fmt(tLeft);
  $('workClock').classList.remove('warn');
  show('workScr'); buzz(80);
  stopT();
  tInt = setInterval(()=>{
    tLeft--;
    $('workClock').textContent = fmt(Math.max(tLeft,0));
    if(tLeft<=5 && tLeft>0){ $('workClock').classList.add('warn'); beep(660,.15); }
    if(tLeft<=0){ stopT(); beep(880,.6); buzz([200,100,200]); completeSet(); }
  },1000);
}

function runRest(){
  const d = DAYS[dayIdx];
  const nextTxt = setDone < setsOf(d.ex[exIdx].rx)
    ? 'next: set '+(setDone+1)+' — '+d.ex[exIdx].n
    : (exIdx+1 < d.ex.length ? 'next: '+d.ex[exIdx+1].n : 'last one — finish!');
  $('restNext').textContent = nextTxt;
  tLeft = REST; $('restClock').textContent = fmt(tLeft);
  show('restScr'); stopT();
  tInt = setInterval(()=>{
    tLeft--;
    $('restClock').textContent = fmt(Math.max(tLeft,0));
    if(tLeft<=0){ stopT(); beep(880,.5); buzz([150,80,150]); advanceAfterRest(); }
  },1000);
}

function completeSet(){
  const d = DAYS[dayIdx], e = d.ex[exIdx];
  setDone++;
  buzz(120);
  if(setDone >= setsOf(e.rx)){ markExDone(); }
  else runRest();
}
function advanceAfterRest(){
  const d = DAYS[dayIdx];
  if(setDone >= setsOf(d.ex[exIdx].rx)) nextEx();
  else renderEx();
}
function markExDone(){
  const d = DAYS[dayIdx];
  loadSess();
  sess[d.id] = sess[d.id] || {done:[]};
  if(!sess[d.id].done.includes(exIdx)) sess[d.id].done.push(exIdx);
  saveSess();
  if(exIdx+1 < d.ex.length){ runRest(); }
  else finish();
}
function nextEx(){
  const d = DAYS[dayIdx];
  if(exIdx+1 < d.ex.length){ exIdx++; setDone = 0; renderEx(); }
  else finish();
}
function prevEx(){ if(exIdx>0){ exIdx--; setDone=0; stopT(); renderEx(); } }
function finish(){
  stopT();
  const d = DAYS[dayIdx];
  loadSess();
  const ct = (sess[d.id] && sess[d.id].done.length) || 0;
  $('doneSum').textContent = d.label+' · '+ct+' / '+d.ex.length+' exercises';
  buzz([200,100,200,100,400]);
  show('doneScr');
}

/* ---------- wire up ---------- */
$('dayPrev').onclick = ()=>{ dayIdx = (dayIdx+6)%7; renderHome(); };
$('dayNext').onclick = ()=>{ dayIdx = (dayIdx+1)%7; renderHome(); };
$('homeChip').onclick = ()=>{
  const p = $('startPick');
  p.value = K('f48w-startdate') || '';
  try{ p.showPicker ? p.showPicker() : p.click(); }catch(_){ p.click(); }
};
$('startPick').onchange = ()=>{
  if($('startPick').value){ KS('f48w-startdate', $('startPick').value); weekChip(); }
};
$('startBtn').onclick = ()=>{ exIdx=0; setDone=0; renderEx(); };
$('resumeBtn').onclick = ()=>{
  const d = DAYS[dayIdx]; loadSess();
  const done = (sess[d.id] && sess[d.id].done) || [];
  exIdx = 0;
  while(exIdx < d.ex.length && done.includes(exIdx)) exIdx++;
  if(exIdx >= d.ex.length) exIdx = d.ex.length-1;
  setDone = 0; renderEx();
};
$('exMain').onclick = ()=>{
  const w = workSecs(DAYS[dayIdx].ex[exIdx].rx);
  if(w) runWork(w); else completeSet();
};
$('exSkip').onclick = nextEx;
$('exNext').onclick = nextEx;
$('exPrev').onclick = prevEx;
$('exCue').onclick = e => e.target.classList.toggle('open');
$('workScr').onclick = ()=>{ stopT(); renderEx(); };
$('restSkip').onclick = ()=>{ stopT(); advanceAfterRest(); };
$('doneHome').onclick = renderHome;

/* keep screen awake during a session (Chromium wake lock) */
let wl = null;
async function wake(){ try{ wl = await navigator.wakeLock.request('screen'); }catch(_){} }
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') wake(); });
wake();

renderHome();
</script>
</body>
</html>
